<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    /* Using your specific CSS theme colors */
    .node-left { fill: #8B46FF; opacity: 0.85; }
    .node-right { fill: #F05638; opacity: 0.85; }
    .pupil { fill: #2D2A32; }
  </style>
  
  <!-- Overlapping Data Nodes -->
