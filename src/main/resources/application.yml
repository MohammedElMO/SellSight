spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: sellsight

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sellsight_db}
    username: ${SPRING_DATASOURCE_USERNAME:sellsight}
    password: ${SPRING_DATASOURCE_PASSWORD:sellsight}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  address: 0.0.0.0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:c2VsbHNpZ2h0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1Ni1iaXRz}
  expiration: ${JWT_EXPIRATION:86400000}

# OAuth2 providers
oauth:
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
  slack:
    client-id: ${OAUTH_SLACK_CLIENT_ID:}
    client-secret: ${OAUTH_SLACK_CLIENT_SECRET:}

# SpringDoc OpenAPI / Swagger UI
# Single flat spec — all endpoints at /v3/api-docs, grouped by @Tag in the UI.
# Portman fetches this URL directly; splitting into groups would expose only one
# group to Portman and hide the rest from the default Swagger UI view.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    doc-expansion: none
    display-request-duration: true
