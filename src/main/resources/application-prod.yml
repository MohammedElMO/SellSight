spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  threads:
    virtual:
      enabled: true
  # Flyway runs in prod; never auto-migrate schema via JPA

  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  port: 8081

# Override all localhost defaults with required env vars (no fallbacks in prod)
spring.datasource:
  url: ${SPRING_DATASOURCE_URL}
  username: ${SPRING_DATASOURCE_USERNAME}
  password: ${SPRING_DATASOURCE_PASSWORD}
  hikari:
    maximum-pool-size: 100   # virtual threads are cheap; DB is the bottleneck
    minimum-idle: 10
    connection-timeout: 3000  # fail fast rather than hanging under load
    idle-timeout: 300000
    max-lifetime: 1200000
    leak-detection-threshold: 30000
    keepalive-time: 60000

spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

spring.data.redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT:6379}
  connect-timeout: 2s

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


app:
  # Must be the frontend URL, e.g. https://sellsights.com
  base-url: ${APP_BASE_URL}
  email:
    provider: ${EMAIL_PROVIDER}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  verification:
    bypass-emails: ${APP_VERIFICATION_BYPASS_EMAILS:}

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: ERROR
    org.example.sellsight: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

oauth:
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI}
  slack:
    client-id: ${OAUTH_SLACK_CLIENT_ID}
    client-secret: ${OAUTH_SLACK_CLIENT_SECRET}
    redirect-uri: ${OAUTH_SLACK_REDIRECT_URI}

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM}
brevo:
  api-key: ${BREVO_API_KEY}
  from: ${BREVO_FROM}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key:    ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  secure:     ${CLOUDINARY_SECURE:true}
