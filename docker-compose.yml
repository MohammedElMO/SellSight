services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sellsight-db
    shm_size: 16gb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellsight}
      POSTGRES_DB: ${POSTGRES_DB:-sellsight_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellsight} -d ${POSTGRES_DB:-sellsight_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: sellsight-kafka
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sellsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  embedding:
    build:
      context: ./embedding-model
      dockerfile: Dockerfile
    container_name: sellsight-embedding
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sellsight-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sellsight_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sellsight}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sellsight}
      JWT_SECRET: ${JWT_SECRET:-c2VsbHNpZ2h0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1Ni1iaXRz}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-SellSight <noreply@sellsight.local>}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URI: ${OAUTH_GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      OAUTH_SLACK_CLIENT_ID: ${OAUTH_SLACK_CLIENT_ID:-}
      OAUTH_SLACK_CLIENT_SECRET: ${OAUTH_SLACK_CLIENT_SECRET:-}
      OAUTH_SLACK_REDIRECT_URI: ${OAUTH_SLACK_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding:8000}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Big Data / Hadoop pipeline (optional profile)
  # Start with: docker compose --profile bigdata up -d
  # ---------------------------------------------------------------------------

  namenode:
    profiles: ["bigdata"]
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.3.6-java8
    container_name: sellsight-hadoop-namenode
    environment:
      CLUSTER_NAME: sellsight-bigdata
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: "1"
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9870/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  datanode:
    profiles: ["bigdata"]
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.6-java8
    container_name: sellsight-hadoop-datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: namenode:9870
      HDFS_CONF_dfs_replication: "1"
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - datanode:/hadoop/dfs/data
    restart: unless-stopped

  resourcemanager:
    profiles: ["bigdata"]
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.3.6-java8
    container_name: sellsight-hadoop-resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      SERVICE_PRECONDITION: namenode:9870 datanode:9864
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    ports:
      - "8088:8088"
    restart: unless-stopped

  nodemanager:
    profiles: ["bigdata"]
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.3.6-java8
    container_name: sellsight-hadoop-nodemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      SERVICE_PRECONDITION: namenode:9870 resourcemanager:8088
    depends_on:
      resourcemanager:
        condition: service_started
    ports:
      - "8042:8042"
    restart: unless-stopped

  historyserver:
    profiles: ["bigdata"]
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.3.6-java8
    container_name: sellsight-hadoop-historyserver
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      SERVICE_PRECONDITION: resourcemanager:8088
    depends_on:
      resourcemanager:
        condition: service_started
    ports:
      - "8188:8188"
    restart: unless-stopped

  hive-metastore-db:
    profiles: ["bigdata"]
    image: postgres:15-alpine
    container_name: sellsight-hive-metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    ports:
      - "5433:5432"
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    restart: unless-stopped

  hive-metastore:
    profiles: ["bigdata"]
    image: bde2020/hive-metastore:2.3.2-postgresql-metastore
    container_name: sellsight-hive-metastore
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: hive-metastore-db:5432 namenode:9870 datanode:9864
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-db:5432/hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      HIVE_SITE_CONF_datanucleus_autoCreateSchema: "true"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: /user/hive/warehouse
    depends_on:
      hive-metastore-db:
        condition: service_started
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    ports:
      - "9083:9083"
    restart: unless-stopped

  hive-server:
    profiles: ["bigdata"]
    image: bde2020/hive-server:2.3.2-postgresql-metastore
    container_name: sellsight-hive-server
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: hive-metastore:9083
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
    depends_on:
      hive-metastore:
        condition: service_started
    ports:
      - "10000:10000"
      - "10002:10002"
    restart: unless-stopped

  sqoop:
    profiles: ["bigdata"]
    image: bde2020/sqoop:1.4.7-postgresql-metastore
    container_name: sellsight-sqoop
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: hive-server:10000 namenode:9870 datanode:9864
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sellsight_db}
      PG_USER: ${POSTGRES_USER:-sellsight}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-sellsight}
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
    depends_on:
      hive-server:
        condition: service_started
    command: ["bash", "-lc", "tail -f /dev/null"]
    restart: unless-stopped

volumes:
  pgdata:
  kafkadata:
  redisdata:
  namenode:
  datanode:
  hive_metastore_db:
