services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sellsight-db
    shm_size: 16gb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellsight}
      POSTGRES_DB: ${POSTGRES_DB:-sellsight_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellsight} -d ${POSTGRES_DB:-sellsight_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: sellsight-kafka
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sellsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  embedding:
    build:
      context: ./embedding-model
      dockerfile: Dockerfile
    container_name: sellsight-embedding
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-cpu}
      MAX_TEXT_CHARS: ${EMBEDDING_MAX_TEXT_CHARS:-300}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sellsight-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sellsight_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sellsight}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sellsight}
      JWT_SECRET: ${JWT_SECRET:-c2VsbHNpZ2h0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1Ni1iaXRz}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-SellSight <noreply@sellsight.local>}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URI: ${OAUTH_GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      OAUTH_SLACK_CLIENT_ID: ${OAUTH_SLACK_CLIENT_ID:-}
      OAUTH_SLACK_CLIENT_SECRET: ${OAUTH_SLACK_CLIENT_SECRET:-}
      OAUTH_SLACK_REDIRECT_URI: ${OAUTH_SLACK_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding:8000}
      EMBEDDING_SERVICE_CONNECT_TIMEOUT: ${EMBEDDING_SERVICE_CONNECT_TIMEOUT:-2s}
      EMBEDDING_SERVICE_READ_TIMEOUT: ${EMBEDDING_SERVICE_READ_TIMEOUT:-3s}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped

  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    environment:
      - CLUSTER_NAME=sellsight
    ports:
      - "9870:9870"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./scripts/bigdata/mapreduce:/opt/mapreduce
    restart: unless-stopped

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
    depends_on:
      - hadoop-namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    restart: unless-stopped

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - hadoop-namenode
      - hadoop-datanode
      - postgres
    environment:
      - HIVE_METASTORE_HOST=hive-server
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - DATABASE_DRIVER=org.postgresql.Driver
      - DATABASE_URL=jdbc:postgresql://postgres:5432/sellsight_hive_metastore
      - DATABASE_USER=sellsight
      - DATABASE_PASSWORD=sellsight
    ports:
      - "10000:10000"
    volumes:
      - ./scripts/bigdata/hive:/opt/hive-scripts
    restart: unless-stopped

  sqoop:
    image: eclipse-temurin:8-jdk
    container_name: sqoop
    environment:
      - HADOOP_USER_ROOT=hdfs
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
    depends_on:
      - hadoop-namenode
      - hadoop-datanode
      - postgres
    volumes:
      - ./scripts/bigdata/sqoop:/opt/sqoop-scripts
      - ./scripts/bigdata/mapreduce:/opt/mapreduce
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        apt-get update
        apt-get install -y --no-install-recommends wget tar ca-certificates procps
        rm -rf /var/lib/apt/lists/*
        mkdir -p /opt
        if [ ! -d /opt/sqoop ]; then
          wget -q https://archive.apache.org/dist/sqoop/1.4.7/sqoop-1.4.7.bin__hadoop-2.6.0.tar.gz -O /tmp/sqoop.tgz
          tar -xzf /tmp/sqoop.tgz -C /opt
          mv /opt/sqoop-1.4.7.bin__hadoop-2.6.0 /opt/sqoop
          rm -f /tmp/sqoop.tgz
        fi
        wget -q https://jdbc.postgresql.org/download/postgresql-42.2.18.jar -O /opt/sqoop/lib/postgresql.jar
        tail -f /dev/null
    restart: unless-stopped

volumes:
  pgdata:
  kafkadata:
  redisdata:
  hadoop_namenode:
  hadoop_datanode:
